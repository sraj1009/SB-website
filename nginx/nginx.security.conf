# SECURITY HARDENED NGINX CONFIGURATION - SINGGLEBEE PLATFORM
# Zero-trust reverse proxy with comprehensive security headers

# Run as non-root user
user nginx;

# Auto-tune worker processes (security + performance)
worker_processes auto;
pid /var/run/nginx.pid;

# Security: Limit connections and error handling
events {
    worker_connections 1024;
    multi_accept on;
    accept_mutex off;
}

# Security: Hide nginx version and limit information disclosure
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Security: Server tokens and information disclosure
    server_tokens off;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;
    
    # Security: Advanced rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    
    # Security: Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_conn conn_limit_per_ip 20;
    
    # Security: Request size limits
    client_max_body_size 5M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Security: Timeout settings
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
    
    # Security: Buffer overflow protection
    client_body_buffer_size 1K;
    client_header_buffer_size 1k;
    client_max_body_size 5M;
    large_client_header_buffers 2 1k;
    
    # Security: Disable methods
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 405;
    }
    
    # Security: Block common attack patterns
    if ($args ~* "union.*select.*(") {
        return 403;
    }
    if ($args ~* "concat.*(") {
        return 403;
    }
    if ($args ~* "base64_") {
        return 403;
    }
    if ($args ~* "../") {
        return 403;
    }
    if ($args ~* "etc/passwd") {
        return 403;
    }
    if ($args ~* "proc/self/environ") {
        return 403;
    }
    
    # Logging with security considerations
    log_format security '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       '$request_time $upstream_response_time '
                       '$request_id';
    
    access_log /var/log/nginx/access.log security;
    error_log /var/log/nginx/error.log warn;
    
    # Security: TLS configuration
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_ecdh_curve secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security: HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Security: Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://api.singglebee.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    
    # Security: Other security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    
    # Gzip compression with security
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Security: Remove server signature from error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    # Main server block
    server {
        listen 80;
        listen [::]:80;
        server_name singglebee.com www.singglebee.com api.singglebee.com;
        
        # Security: Redirect all HTTP to HTTPS
        return 301 https://$host$request_uri;
    }
    
    # HTTPS server block
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name singglebee.com www.singglebee.com;
        
        # SSL certificates
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # Security: OCSP stapling
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
        
        # Security: Rate limiting
        limit_req zone=general burst=50 nodelay;
        
        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
            
            # Security: Cache control for static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options nosniff;
            }
            
            # Security: Block access to sensitive files
            location ~* \.(env|log|conf|key|pem|crt)$ {
                deny all;
                return 404;
            }
        }
        
        # API proxy with security
        location /api/ {
            # Security: Rate limiting for API
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Security: Hide backend headers
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            
            # Security: Timeout settings
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Security: Buffer limits
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }
        
        # Authentication endpoints with stricter rate limiting
        location /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;
            
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Upload endpoints with strict limits
        location /api/v1/upload/ {
            limit_req zone=upload burst=2 nodelay;
            
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Security: Upload-specific settings
            client_max_body_size 5M;
            proxy_request_buffering off;
        }
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Security: Block access to sensitive paths
        location ~ /\. {
            deny all;
            return 404;
        }
        
        location ~ ^/(admin|config|backup|logs|tmp|cache)/ {
            deny all;
            return 404;
        }
    }
    
    # API subdomain
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.singglebee.com;
        
        # SSL certificates
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # Security: Only API endpoints allowed
        location / {
            limit_req zone=api burst=30 nodelay;
            
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Security: API-specific headers
            add_header X-API-Version "v1";
            add_header X-Rate-Limit-Limit "30";
            add_header X-Rate-Limit-Remaining "29";
        }
    }
}
