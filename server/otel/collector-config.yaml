receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: 'singglebee-backend'
          static_configs:
            - targets: ['localhost:5000']
          metrics_path: '/metrics'
        - job_name: 'singglebee-frontend'
          static_configs:
            - targets: ['localhost:5173']
          metrics_path: '/api/metrics'
  zipkin:
    endpoint: 0.0.0.0:9411

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s
  resource:
    attributes:
      - key: service.name
        value: singglebee-api
        action: upsert
      - key: service.version
        value: "1.0.0"
        action: upsert
      - key: environment
        value: "production"
        action: upsert
  attributes:
    actions:
      - key: environment
        action: hash
      - key: user.id
        action: hash
      - key: email
        action: redact

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "singglebee"
  otlphttp:
    endpoint: "https://api.honeycomb.io/v1/traces"
    headers:
      "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
  logging:
    loglevel: info
  zipkin:
    endpoint: "http://zipkin:9411/api/v2/spans"
    format: json
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    index: "otel-logs"
  
service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp, zipkin]
      processors: [memory_limiter, batch, resource, attributes]
      exporters: [otlphttp, zipkin]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus, otlphttp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource, attributes]
      exporters: [logging, elasticsearch]
