name: 🔒 Security Scan & Compliance Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Dependency Security Scan
  dependency-scan:
    name: 🔍 Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
        
    - name: Install dependencies
      working-directory: ./server
      run: npm ci --production=false
      
    - name: Run npm audit
      working-directory: ./server
      run: |
        echo "🔍 Running npm audit..."
        npm audit --audit-level=moderate
        echo "✅ npm audit completed"
        
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        command: monitor
        working-directory: server
        
    - name: Generate dependency report
      working-directory: ./server
      run: |
        npm ls --json > dependency-report.json
        echo "📊 Dependency report generated"
        
    - name: Upload dependency report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: server/dependency-report.json
        retention-days: 30

  # Static Application Security Testing (SAST)
  sast-scan:
    name: 🔍 Static Code Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
        
    - name: Install dependencies
      working-directory: ./server
      run: npm ci --production=false
      
    - name: Run ESLint security scan
      working-directory: ./server
      run: |
        echo "🔍 Running ESLint security scan..."
        npx eslint . --ext .js,.ts --config .eslintrc.json --format=json > eslint-report.json || true
        echo "✅ ESLint scan completed"
        
    - name: Run Semgrep SAST scan
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/owasp-top-ten
          p/secrets
          p/insecure-transport
          p/express
        suppress: false
        generate-sarif: true
        
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: semgrep.sarif
        
    - name: Upload ESLint report
      uses: actions/upload-artifact@v4
      with:
        name: eslint-report
        path: server/eslint-report.json
        retention-days: 30

  # Container Security Scan
  container-scan:
    name: 🐳 Container Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        dockerfile: ./server/Dockerfile.security
        tags: singglebee/backend:security-scan
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: singglebee/backend:security-scan
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Run Docker Scout scan
      env:
        DOCKER_SCOUT_TOKEN: ${{ secrets.DOCKER_SCOUT_TOKEN }}
      run: |
        echo "🔍 Running Docker Scout scan..."
        docker scout cves --image singglebee/backend:security-scan --format json > docker-scout-report.json || true
        echo "✅ Docker Scout scan completed"
        
    - name: Upload Docker Scout report
      uses: actions/upload-artifact@v4
      with:
        name: docker-scout-report
        path: docker-scout-report.json
        retention-days: 30

  # Infrastructure Security Scan
  infrastructure-scan:
    name: 🏗️ Infrastructure Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Checkov IaC security scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: dockerfile,kubernetes
        soft_fail: true
        output_format: sarif
        output_file_path: reports
        skip_check: CKV_DOCKER_7  # Skip latest tag check for specific use case
        
    - name: Upload Checkov SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: reports/results.sarif
        
    - name: Run Hadolint Dockerfile linting
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: ./server/Dockerfile.security
        format: json
        output-file: hadolint-report.json
        
    - name: Upload Hadolint report
      uses: actions/upload-artifact@v4
      with:
        name: hadolint-report
        path: hadolint-report.json
        retention-days: 30

  # OWASP ZAP Security Scan
  zap-scan:
    name: 🕵️ OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Start application for scanning
      working-directory: ./server
      run: |
        echo "🚀 Starting application for security scanning..."
        npm install
        npm run build
        npm start &
        sleep 30
        echo "✅ Application started"
        
    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://localhost:5000'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a'
        
    - name: Upload ZAP report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: report_html.html
        retention-days: 30
        
    - name: Upload ZAP SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: report_json.sarif

  # Security Compliance Check
  compliance-check:
    name: 📋 Security Compliance Check
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, container-scan]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run OWASP Top 10 compliance check
      run: |
        echo "🔍 Checking OWASP Top 10 2021 compliance..."
        
        # Check for security headers configuration
        grep -r "helmet\|security-headers\|csp" server/ || echo "⚠️ Security headers not fully configured"
        
        # Check for input validation
        find server/ -name "*.js" -o -name "*.ts" | xargs grep -l "zod\|joi\|validation" || echo "⚠️ Input validation not found"
        
        # Check for authentication middleware
        find server/ -name "*.js" -o -name "*.ts" | xargs grep -l "auth\|jwt\|passport" || echo "⚠️ Authentication not found"
        
        # Check for rate limiting
        find server/ -name "*.js" -o -name "*.ts" | xargs grep -l "rate.*limit\|express-rate-limit" || echo "⚠️ Rate limiting not found"
        
        # Check for HTTPS enforcement
        grep -r "https\|tls\|ssl" server/ || echo "⚠️ HTTPS enforcement not found"
        
        echo "✅ OWASP Top 10 compliance check completed"
        
    - name: Check India DPDP Act compliance
      run: |
        echo "🔍 Checking India DPDP Act 2023 compliance..."
        
        # Check for consent mechanisms
        grep -r "consent\|privacy\|data.*collection" server/ || echo "⚠️ Consent mechanisms not found"
        
        # Check for data deletion endpoints
        find server/ -name "*.js" -o -name "*.ts" | xargs grep -l "delete.*user\|remove.*data\|right.*erasure" || echo "⚠️ Data deletion endpoints not found"
        
        # Check for data export functionality
        find server/ -name "*.js" -o -name "*.ts" | xargs grep -l "export.*data\|download.*data\|portability" || echo "⚠️ Data export not found"
        
        # Check for privacy policy
        ls public/privacy-policy.md || echo "⚠️ Privacy policy not found"
        
        echo "✅ DPDP Act compliance check completed"
        
    - name: Check PCI-DSS compliance
      run: |
        echo "🔍 Checking PCI-DSS v4.0 compliance..."
        
        # Check for payment security
        find server/ -name "*.js" -o -name "*.ts" | xargs grep -l "payment\|cashfree\|webhook" || echo "⚠️ Payment handling not found"
        
        # Check for webhook signature verification
        grep -r "signature\|hmac\|webhook.*verify" server/ || echo "⚠️ Webhook verification not found"
        
        # Check for card data handling
        find server/ -name "*.js" -o -name "*.ts" | xargs grep -l "card\|credit.*card\|cvv" && echo "⚠️ Card data handling detected - ensure compliance" || echo "✅ No card data handling found"
        
        # Check for encryption
        grep -r "encrypt\|crypto\|tls\|ssl" server/ || echo "⚠️ Encryption not found"
        
        echo "✅ PCI-DSS compliance check completed"

  # Security Score and Report
  security-report:
    name: 📊 Security Score & Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, container-scan, zap-scan, compliance-check]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Generate security score
      run: |
        echo "📊 Generating comprehensive security score..."
        
        # Calculate security score based on scan results
        SCORE=0
        MAX_SCORE=100
        
        # Dependency security (20 points)
        if [ -f dependency-report.json ]; then
          SCORE=$((SCORE + 20))
          echo "✅ Dependency security: 20/20 points"
        else
          echo "❌ Dependency security: 0/20 points"
        fi
        
        # Code security (25 points)
        if [ -f eslint-report.json ] || [ -f semgrep.sarif ]; then
          SCORE=$((SCORE + 25))
          echo "✅ Code security: 25/25 points"
        else
          echo "❌ Code security: 0/25 points"
        fi
        
        # Container security (20 points)
        if [ -f trivy-results.sarif ] || [ -f docker-scout-report.json ]; then
          SCORE=$((SCORE + 20))
          echo "✅ Container security: 20/20 points"
        else
          echo "❌ Container security: 0/20 points"
        fi
        
        # Application security (25 points)
        if [ -f zap-report/report_html.html ]; then
          SCORE=$((SCORE + 25))
          echo "✅ Application security: 25/25 points"
        else
          echo "❌ Application security: 0/25 points"
        fi
        
        # Compliance (10 points)
        SCORE=$((SCORE + 10))
        echo "✅ Compliance checks: 10/10 points"
        
        echo "🎯 Overall Security Score: $SCORE/$MAX_SCORE"
        
        # Generate security badge
        if [ $SCORE -ge 90 ]; then
          COLOR="brightgreen"
          STATUS="Excellent"
        elif [ $SCORE -ge 80 ]; then
          COLOR="green"
          STATUS="Good"
        elif [ $SCORE -ge 70 ]; then
          COLOR="yellow"
          STATUS="Fair"
        elif [ $SCORE -ge 60 ]; then
          COLOR="orange"
          STATUS="Poor"
        else
          COLOR="red"
          STATUS="Critical"
        fi
        
        echo "🏆 Security Status: $STATUS"
        echo "📈 Badge Color: $COLOR"
        
        # Save score to file
        echo "{\"score\": $SCORE, \"maxScore\": $MAX_SCORE, \"status\": \"$STATUS\", \"color\": \"$COLOR\"}" > security-score.json
        
    - name: Upload security score
      uses: actions/upload-artifact@v4
      with:
        name: security-score
        path: security-score.json
        retention-days: 30
        
    - name: Create security summary
      run: |
        echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Security Score" >> $GITHUB_STEP_SUMMARY
        cat security-score.json >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📋 Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Dependency Security Scan" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Static Code Analysis" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Container Security Scan" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ OWASP ZAP Application Scan" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Compliance Checks" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📁 Reports" >> $GITHUB_STEP_SUMMARY
        echo "All security reports are available in the artifacts section." >> $GITHUB_STEP_SUMMARY

  # Security Notification
  security-notification:
    name: 📢 Security Notification
    runs-on: ubuntu-latest
    needs: [security-report]
    if: failure()
    
    steps:
    - name: Notify security team
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#security-alerts'
        text: '🚨 Security scan failed! Please review the scan results and address critical issues.'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        
    - name: Send email notification
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: '🚨 SINGGLEBEE Security Scan Failed'
        to: ${{ secrets.SECURITY_TEAM_EMAIL }}
        from: 'security@singglebee.com'
        body: |
          The security scan for SINGGLEBEE has failed.
          
          Please check the GitHub Actions for detailed results:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          This requires immediate attention to ensure security compliance.
