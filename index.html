<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="SINGGLEBEE - Premium Educational Books, Rhymes, and Supplies for kids. Bilingual (Tamil & English) learning content." />
    <meta name="keywords" content="educational books, kids books, tamil rhymes, english rhymes, stationary, children learning, singglebee" />
    <title>SINGGLEBEE | Premium Marketplace</title>
    <link rel="icon" type="image/png" href="/assets/bee-character.png" />
    <link rel="apple-touch-icon" href="/assets/bee-character.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Quicksand"', 'system-ui', 'sans-serif'],
              heading: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: {
                black: '#1F120F',
                dark: '#2D1B18',
                primary: '#FFC107',
                secondary: '#E65100',
                accent: '#FFF8E1',
                light: '#FFFDF7',
                meadow: '#2E7D32',
                rose: '#BE123C',
              },
            },
            boxShadow: {
              honey: '0 12px 40px -10px rgba(62, 39, 35, 0.08)',
              'honey-hover': '0 20px 50px -12px rgba(62, 39, 35, 0.15)',
              premium: '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-out-up': 'slideOutUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
              'slide-in-right': 'slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-in-left': 'slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              float: 'float 5s ease-in-out infinite',
              buzz: 'buzz 0.5s ease-in-out infinite',
              pop: 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'wing-left': 'wingLeft 0.15s ease-in-out infinite alternate',
              'wing-right': 'wingRight 0.15s ease-in-out infinite alternate',
              'spin-3d': 'spin3D 1s cubic-bezier(0.4, 0, 0.2, 1) forwards',
              'wiggle-playful': 'wigglePlayful 0.6s ease-in-out infinite',
              'honey-pulse': 'honeyPulse 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards',
              blink: 'blink 6s ease-in-out infinite',
              shimmer: 'shimmer 2s linear infinite',
              'progress-grow': 'progressGrow 4s ease-out forwards',
              'fly-across': 'flyAcross 15s linear forwards',
              'nectar-flow': 'nectarFlow 3s infinite linear',
              'nectar-drip-v2': 'nectarDripV2 4s infinite ease-in',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: {
                '0%': { transform: 'translateY(30px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              slideOutUp: {
                '0%': { transform: 'translateY(0)', opacity: '1' },
                '100%': { transform: 'translateY(-30px)', opacity: '0' },
              },
              slideInRight: {
                '0%': { transform: 'translateX(100%)' },
                '100%': { transform: 'translateX(0)' },
              },
              slideInLeft: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-25px)' },
              },
              buzz: {
                '0%, 100%': { transform: 'rotate(0deg)' },
                '25%': { transform: 'rotate(-4deg)' },
                '75%': { transform: 'rotate(4deg)' },
              },
              pop: {
                '0%': { transform: 'scale(0.95)' },
                '50%': { transform: 'scale(1.05)' },
                '100%': { transform: 'scale(1)' },
              },
              wingLeft: {
                from: { transform: 'rotate(-10deg) skewX(-10deg)' },
                to: { transform: 'rotate(35deg) skewX(12deg)' },
              },
              wingRight: {
                from: { transform: 'rotate(10deg) skewX(10deg)' },
                to: { transform: 'rotate(-35deg) skewX(-12deg)' },
              },
              spin3D: {
                '0%': { transform: 'rotateY(0deg)' },
                '100%': { transform: 'rotateY(360deg)' },
              },
              wigglePlayful: {
                '0%, 100%': { transform: 'rotate(0deg) scale(1.1)' },
                '25%': { transform: 'rotate(12deg) scale(1.15)' },
                '75%': { transform: 'rotate(-12deg) scale(1.15)' },
              },
              honeyPulse: {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '30%': { opacity: '0.2' },
                '100%': { transform: 'scale(2.2)', opacity: '0' },
              },
              blink: {
                '0%, 94%, 100%': { transform: 'scaleY(1)' },
                '96%': { transform: 'scaleY(0.1)' },
              },
              shimmer: {
                '100%': { transform: 'translateX(100%)' },
              },
              progressGrow: {
                '0%': { width: '0%' },
                '100%': { width: '100%' },
              },
              flyAcross: {
                '0%': { transform: 'translateX(-10vw) translateY(10vh) rotate(15deg)' },
                '25%': { transform: 'translateX(25vw) translateY(-10vh) rotate(-15deg)' },
                '50%': { transform: 'translateX(50vw) translateY(5vh) rotate(15deg)' },
                '75%': { transform: 'translateX(75vw) translateY(-5vh) rotate(-15deg)' },
                '100%': { transform: 'translateX(110vw) translateY(10vh) rotate(15deg)' },
              },
              nectarFlow: {
                '0%': { 'background-position': '0% 50%' },
                '100%': { 'background-position': '200% 50%' },
              },
              nectarDripV2: {
                '0%': { transform: 'translateY(0) scaleY(0)', opacity: '0' },
                '10%': { transform: 'translateY(0) scaleY(1)', opacity: '1' },
                '60%': { transform: 'translateY(12px) scaleY(1.5)', opacity: '0.8' },
                '100%': { transform: 'translateY(24px) scaleY(0.5)', opacity: '0' },
              },
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand-black: #1f120f;
        --brand-primary: #ffc107;
      }

      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #fffdf7;
        color: var(--brand-black);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }

      h1,
      h2,
      h3,
      h4 {
        font-family: 'Plus Jakarta Sans', sans-serif;
        letter-spacing: -0.02em;
      }

      .honeycomb-pattern {
        background-image: radial-gradient(var(--brand-primary) 0.8px, transparent 0.8px);
        background-size: 24px 24px;
        opacity: 0.08;
        animation: panBackground 60s linear infinite;
      }

      @keyframes panBackground {
        0% {
          background-position: 0 0;
        }

        100% {
          background-position: 100% 100%;
        }
      }

      .glass {
        background: rgba(255, 253, 247, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 193, 7, 0.15);
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .perspective-1000 {
        perspective: 1000px;
      }

      .preserve-3d {
        transform-style: preserve-3d;
      }

      input:focus,
      textarea:focus {
        box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.2);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #fffdf7;
      }

      ::-webkit-scrollbar-thumb {
        background: #e6b000;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #1f120f;
      }

      .honey-bubble {
        position: absolute;
        background: rgba(255, 193, 7, 0.5);
        border-radius: 50%;
        pointer-events: none;
        animation: bubbleUp 1.6s ease-out forwards;
      }

      @keyframes bubbleUp {
        0% {
          transform: translateY(0) scale(0);
          opacity: 0.6;
        }

        100% {
          transform: translateY(-120px) scale(1.6);
          opacity: 0;
        }
      }

      .pollen-grain {
        position: absolute;
        width: 4px;
        height: 4px;
        background: var(--brand-primary);
        border-radius: 50%;
        pointer-events: none;
        opacity: 0.3;
        z-index: 5;
      }

      .nectar-text-flow {
        background: linear-gradient(
          to right,
          #e65100 0%,
          #ffc107 25%,
          #e65100 50%,
          #ffc107 75%,
          #e65100 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: nectarFlow 3s infinite linear;
      }

      .nectar-underline {
        background: linear-gradient(
          to right,
          #ffc107 0%,
          #e65100 25%,
          #ffc107 50%,
          #e65100 75%,
          #ffc107 100%
        );
        background-size: 200% auto;
        animation: nectarFlow 2s infinite linear;
        border-radius: 20px;
        height: 6px;
        width: 100%;
        box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
          "@google/genai": "https://esm.sh/@google/genai@1.36.0",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "react/": "https://esm.sh/react@^19.2.3/"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
